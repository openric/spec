<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <style>
    :root {
      --fg: #1a1a1a;
      --muted: #6b7280;
      --accent: #1f5fa8;
      --accent-hover: #0f3e75;
      --border: #e5e7eb;
      --bg: #ffffff;
      --nav-bg: #f9fafb;
      --code-bg: #f3f4f6;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      color: var(--fg);
      background: var(--bg);
      line-height: 1.6;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }

    .site-nav {
      background: var(--nav-bg);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1.2rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
    }
    .nav-brand {
      font-weight: 600;
      font-size: 1.05rem;
      color: var(--fg);
      margin-right: auto;
    }
    .nav-brand a { color: inherit; text-decoration: none; }
    .nav-brand small {
      color: var(--muted);
      font-weight: 400;
      font-size: 0.8rem;
      margin-left: 0.4rem;
    }
    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem 1rem;
      align-items: center;
      font-size: 0.95rem;
    }
    .nav-links a {
      color: var(--fg);
      padding: 0.2rem 0.1rem;
      border-bottom: 2px solid transparent;
    }
    .nav-links a:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
      text-decoration: none;
    }
    .nav-links a.external::after {
      content: " ↗";
      color: var(--muted);
      font-size: 0.85em;
    }
    .nav-links .sep {
      color: var(--border);
      user-select: none;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.2rem 3rem;
    }
    h1 { font-size: 2rem; margin-top: 0; line-height: 1.2; }
    h2 { font-size: 1.5rem; margin-top: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
    h3 { font-size: 1.2rem; margin-top: 1.5rem; }
    h4 { font-size: 1.05rem; }
    p, ul, ol { margin: 0.6rem 0; }
    ul, ol { padding-left: 1.6rem; }
    li { margin: 0.15rem 0; }

    code {
      font-family: "SF Mono", Menlo, Monaco, "Cascadia Mono", Consolas, monospace;
      font-size: 0.9em;
      background: var(--code-bg);
      padding: 0.1em 0.35em;
      border-radius: 3px;
    }
    pre {
      background: var(--code-bg);
      padding: 0.8rem 1rem;
      border-radius: 4px;
      overflow-x: auto;
      line-height: 1.45;
    }
    pre code { background: none; padding: 0; font-size: 0.88em; }

    table {
      border-collapse: collapse;
      margin: 1rem 0;
      width: 100%;
      font-size: 0.95em;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 0.45rem 0.7rem;
      text-align: left;
      vertical-align: top;
    }
    th { background: var(--nav-bg); font-weight: 600; }

    blockquote {
      border-left: 3px solid var(--accent);
      margin: 1rem 0;
      padding: 0.3rem 1rem;
      color: var(--muted);
      background: var(--nav-bg);
    }

    hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

    .site-footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 1.2rem;
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
    }
    .site-footer a { color: var(--muted); text-decoration: underline; }

    @media (max-width: 640px) {
      .nav-brand { flex-basis: 100%; margin-bottom: 0.4rem; }
      .nav-links { gap: 0.2rem 0.8rem; font-size: 0.9rem; }
      .nav-links .sep { display: none; }
    }
  </style>
</head>
<body>

  <nav class="site-nav" aria-label="Primary">
    <div class="nav-inner">
      <div class="nav-brand">
        <a href="{{ '/' | relative_url }}">OpenRiC</a>
        <small>v0.1.0-draft</small>
      </div>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <span class="sep">·</span>
        <a href="{{ '/spec/mapping.html' | relative_url }}">Mapping</a>
        <a href="{{ '/spec/viewing-api.html' | relative_url }}">Viewing API</a>
        <a href="{{ '/spec/graph-primitives.html' | relative_url }}">Graph Primitives</a>
        <a href="{{ '/spec/conformance.html' | relative_url }}">Conformance</a>
        <span class="sep">·</span>
        <a href="https://github.com/ArchiveHeritageGroup/heratio" class="external">Reference Implementation</a>
        <a href="https://github.com/ArchiveHeritageGroup/openric-spec" class="external">GitHub</a>
      </div>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>
      OpenRiC specification © 2026 The Archive and Heritage Group (Pty) Ltd and contributors.
      Licensed under <a href="https://creativecommons.org/licenses/by/4.0/">CC&nbsp;BY&nbsp;4.0</a>.
      &middot;
      <a href="https://github.com/ArchiveHeritageGroup/openric-spec">Source on GitHub</a>
    </p>
  </footer>

</body>
</html>
