<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --fg:        #0f172a;
      --muted:     #64748b;
      --muted-2:   #475569;
      --accent:    #0f3e75;
      --accent-2:  #1f5fa8;
      --accent-h:  #072545;
      --border:    #e2e8f0;
      --bg:        #ffffff;
      --surface:   #f8fafc;
      --surface-2: #f1f5f9;
      --code-bg:   #eef2f7;
      --live:      #10b981;
      --pending:   #f59e0b;
      --draft:     #94a3b8;
      --radius:    8px;
      --shadow:    0 1px 3px rgba(15, 23, 42, 0.05), 0 4px 14px -6px rgba(15, 23, 42, 0.08);
      --shadow-lg: 0 2px 6px rgba(15, 23, 42, 0.06), 0 20px 40px -20px rgba(15, 23, 42, 0.15);
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--fg);
      background: var(--bg);
      line-height: 1.65;
      font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent-2); text-decoration: none; transition: color 0.15s; }
    a:hover { color: var(--accent-h); text-decoration: underline; text-underline-offset: 3px; }

    /* ---- Nav ---- */
    .site-nav {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: saturate(180%) blur(8px);
      -webkit-backdrop-filter: saturate(180%) blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0.7rem 1.4rem;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .nav-inner { max-width: 1180px; margin: 0 auto; display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; }
    .nav-brand { font-weight: 700; font-size: 1.05rem; color: var(--fg); margin-right: auto; letter-spacing: -0.01em; }
    .nav-brand a { color: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; }
    .nav-brand .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-2), var(--live)); display: inline-block; }
    .nav-brand small { color: var(--muted); font-weight: 400; font-size: 0.78rem; margin-left: 0.3rem; padding: 0.15rem 0.45rem; background: var(--surface-2); border-radius: 10px; letter-spacing: 0.01em; }
    .nav-links { display: flex; flex-wrap: wrap; gap: 0.1rem 1rem; align-items: center; font-size: 0.9rem; }
    .nav-links a { color: var(--muted-2); padding: 0.35rem 0.5rem; border-radius: 5px; transition: all 0.15s; }
    .nav-links a:hover { color: var(--accent); background: var(--surface-2); text-decoration: none; }
    .nav-links a.external::after { content: " ↗"; opacity: 0.5; font-size: 0.85em; }
    .nav-links a.nav-cta { background: var(--accent); color: #fff; font-weight: 600; padding: 0.35rem 0.75rem; }
    .nav-links a.nav-cta:hover { background: var(--accent-2); color: #fff; }
    .nav-links .sep { color: var(--border); user-select: none; padding: 0 0.15rem; }

    /* ---- Main ---- */
    main { max-width: 1080px; margin: 0 auto; padding: 2.5rem 1.4rem 4rem; }

    /* Typography */
    h1 { font-size: 2.4rem; margin: 0 0 0.4rem; line-height: 1.15; font-weight: 700; letter-spacing: -0.02em; }
    h2 { font-size: 1.55rem; margin: 2.5rem 0 0.9rem; font-weight: 600; letter-spacing: -0.015em; border-bottom: 1px solid var(--border); padding-bottom: 0.35rem; }
    h3 { font-size: 1.2rem; margin: 1.75rem 0 0.6rem; font-weight: 600; letter-spacing: -0.01em; }
    h4 { font-size: 1.02rem; margin: 1.25rem 0 0.4rem; font-weight: 600; }
    p, ul, ol { margin: 0.75rem 0; }
    ul, ol { padding-left: 1.5rem; }
    li { margin: 0.2rem 0; }
    strong { font-weight: 600; color: var(--fg); }
    em { color: var(--muted-2); }

    /* Code */
    code {
      font-family: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.875em;
      background: var(--code-bg);
      padding: 0.12em 0.38em;
      border-radius: 4px;
      color: var(--accent-h);
    }
    pre {
      background: #0f172a;
      color: #e2e8f0;
      padding: 1rem 1.1rem;
      border-radius: var(--radius);
      overflow-x: auto;
      line-height: 1.55;
      font-size: 0.86rem;
    }
    pre code { background: none; padding: 0; color: inherit; font-size: 1em; }

    /* Tables */
    table { border-collapse: separate; border-spacing: 0; margin: 1.2rem 0; width: 100%; font-size: 0.94em; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    th, td { padding: 0.6rem 0.9rem; text-align: left; vertical-align: top; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: 0; }
    th { background: var(--surface); font-weight: 600; font-size: 0.82em; letter-spacing: 0.03em; text-transform: uppercase; color: var(--muted-2); }
    tbody tr:hover { background: var(--surface); }

    blockquote { border-left: 3px solid var(--accent-2); margin: 1rem 0; padding: 0.5rem 1.1rem; color: var(--muted-2); background: var(--surface); border-radius: 0 var(--radius) var(--radius) 0; }
    hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

    /* ---- Hero ---- */
    .hero {
      margin: -2.5rem -1.4rem 2.5rem;
      padding: 3.8rem 1.4rem 3.2rem;
      background:
        radial-gradient(ellipse 60% 80% at 15% 0%, rgba(31, 95, 168, 0.08), transparent 60%),
        radial-gradient(ellipse 50% 60% at 85% 100%, rgba(16, 185, 129, 0.07), transparent 60%),
        linear-gradient(to bottom, var(--surface) 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
    }
    .hero-inner { max-width: 1080px; margin: 0 auto; }
    .hero-eyebrow { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent-2); font-weight: 600; margin-bottom: 0.75rem; display: inline-flex; align-items: center; gap: 0.5rem; }
    .hero-eyebrow::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--live); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2); }
    .hero h1 { font-size: clamp(2.2rem, 4vw, 3.2rem); letter-spacing: -0.028em; margin-bottom: 0.7rem; background: linear-gradient(135deg, var(--fg) 40%, var(--accent-2) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero-lede { font-size: 1.15rem; color: var(--muted-2); max-width: 680px; line-height: 1.55; margin: 0 0 1.6rem; }
    .hero-cta { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 1rem; }
    .hero-cta a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.65rem 1.15rem;
      border-radius: var(--radius);
      font-weight: 500;
      font-size: 0.94rem;
      transition: all 0.15s;
    }
    .hero-cta .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: var(--shadow);
    }
    .hero-cta .btn-primary:hover { background: var(--accent-h); color: #fff; text-decoration: none; transform: translateY(-1px); box-shadow: var(--shadow-lg); }
    .hero-cta .btn-ghost { background: #fff; color: var(--fg); border: 1px solid var(--border); }
    .hero-cta .btn-ghost:hover { border-color: var(--accent-2); color: var(--accent); text-decoration: none; }

    /* ---- Surface cards ---- */
    .surfaces { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
    .surface-card {
      display: block;
      padding: 1.3rem;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      transition: all 0.18s;
      position: relative;
    }
    .surface-card:hover { border-color: var(--accent-2); text-decoration: none; transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .surface-card .surface-icon { font-size: 1.5rem; margin-bottom: 0.5rem; display: block; line-height: 1; }
    .surface-card h3 { margin: 0 0 0.3rem; font-size: 1.02rem; color: var(--fg); font-weight: 600; }
    .surface-card .url { font-family: "JetBrains Mono", monospace; font-size: 0.78rem; color: var(--accent-2); margin-bottom: 0.5rem; word-break: break-all; }
    .surface-card p { margin: 0.3rem 0 0; font-size: 0.89rem; color: var(--muted-2); line-height: 1.5; }

    /* ---- Status pills ---- */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.12rem 0.55rem;
      font-size: 0.72rem;
      font-weight: 500;
      font-family: "Inter", sans-serif;
      border-radius: 999px;
      letter-spacing: 0.02em;
    }
    .status-pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
    .status-pill.live { background: rgba(16, 185, 129, 0.1); color: #047857; }
    .status-pill.live::before { background: var(--live); box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.25); }
    .status-pill.pending { background: rgba(245, 158, 11, 0.1); color: #b45309; }
    .status-pill.pending::before { background: var(--pending); }
    .status-pill.draft { background: rgba(148, 163, 184, 0.15); color: #475569; }
    .status-pill.draft::before { background: var(--draft); }

    /* ---- Phase cards (roadmap) ---- */
    .phases { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1rem; margin: 1.25rem 0; }
    .phase-card {
      padding: 1.1rem 1.25rem;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      position: relative;
    }
    .phase-card .phase-num { font-size: 0.75rem; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .phase-card h4 { margin: 0.3rem 0 0.5rem; font-size: 1rem; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .phase-card p { margin: 0; font-size: 0.88rem; color: var(--muted-2); }
    .phase-card.done { border-color: rgba(16, 185, 129, 0.35); background: linear-gradient(to bottom right, rgba(16, 185, 129, 0.03), transparent); }
    .phase-card.current { border-color: rgba(245, 158, 11, 0.35); background: linear-gradient(to bottom right, rgba(245, 158, 11, 0.04), transparent); }

    /* ---- Callouts ---- */
    .callout {
      padding: 1rem 1.2rem;
      background: var(--surface);
      border-left: 3px solid var(--accent-2);
      border-radius: 0 var(--radius) var(--radius) 0;
      margin: 1rem 0;
    }
    .callout p:last-child { margin-bottom: 0; }

    /* ---- Plain-language lede (under hero) ---- */
    .plain-lede {
      background: linear-gradient(to bottom right, rgba(59, 130, 246, 0.05), rgba(16, 185, 129, 0.04));
      border: 1px solid rgba(59, 130, 246, 0.15);
      border-radius: var(--radius);
      padding: 1.2rem 1.5rem;
      margin: 1.5rem 0 2rem;
      font-size: 1.02rem;
      line-height: 1.6;
      color: var(--fg);
    }
    .plain-lede p { margin: 0; }
    .plain-lede strong { color: var(--accent); }

    /* ---- Boundary grid (OpenRiC vs Reference API vs Tools vs Heratio) ---- */
    .boundary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 0.9rem;
      margin: 1rem 0 1.5rem;
    }
    .boundary-cell {
      padding: 1.1rem 1.2rem;
      background: #fff;
      border: 1px solid var(--border);
      border-top-width: 4px;
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
    }
    .boundary-cell.spec     { border-top-color: #3b82f6; }
    .boundary-cell.impl     { border-top-color: #10b981; }
    .boundary-cell.tools    { border-top-color: #f59e0b; }
    .boundary-cell.consumer { border-top-color: #8b5cf6; }
    .boundary-cell .boundary-label {
      font-size: 0.72rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin-bottom: 0.3rem;
    }
    .boundary-cell .boundary-title {
      font-size: 1.1rem; font-weight: 600; color: var(--fg);
      margin-bottom: 0.45rem;
    }
    .boundary-cell p {
      margin: 0 0 0.8rem; font-size: 0.88rem;
      color: var(--muted-2); line-height: 1.5; flex-grow: 1;
    }
    .boundary-cell .boundary-where {
      font-family: "JetBrains Mono", monospace; font-size: 0.76rem;
      color: var(--accent-2); padding-top: 0.5rem;
      border-top: 1px dashed var(--border);
    }

    /* ---- Audience pathways (who is this for?) ---- */
    .audience-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 0.9rem;
      margin: 1rem 0 1.5rem;
    }
    .audience-card {
      padding: 1.1rem 1.2rem 1rem;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--fg);
      display: flex;
      flex-direction: column;
      transition: all 0.15s;
    }
    .audience-card:hover {
      border-color: var(--accent-2);
      box-shadow: var(--shadow);
      text-decoration: none;
      transform: translateY(-1px);
    }
    .audience-card .audience-icon { font-size: 1.6rem; margin-bottom: 0.4rem; line-height: 1; }
    .audience-card .audience-title {
      font-weight: 600; font-size: 1rem; color: var(--fg);
      margin-bottom: 0.4rem;
    }
    .audience-card p {
      margin: 0; font-size: 0.88rem;
      color: var(--muted-2); line-height: 1.5; flex-grow: 1;
    }
    .audience-card .audience-next {
      margin-top: 0.8rem; font-size: 0.82rem; font-weight: 600;
      color: var(--accent-2); padding-top: 0.5rem;
      border-top: 1px dashed var(--border);
    }

    /* ---- Evaluate-OpenRiC steps (guided journey) ---- */
    .evaluate-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 0.8rem;
      margin: 1rem 0 1.5rem;
      counter-reset: step-counter;
    }
    .evaluate-step {
      padding: 1rem 1.1rem 1.1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--fg);
      display: flex;
      flex-direction: column;
      position: relative;
      transition: all 0.15s;
    }
    .evaluate-step:hover {
      background: #fff;
      border-color: var(--accent-2);
      box-shadow: var(--shadow);
      text-decoration: none;
      transform: translateY(-1px);
    }
    .evaluate-step .step-num {
      position: absolute; top: 0.8rem; right: 1rem;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent-2); color: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 0.82rem; font-weight: 700;
    }
    .evaluate-step .step-title {
      font-weight: 600; font-size: 0.98rem;
      color: var(--accent); margin: 0 2rem 0.35rem 0;
    }
    .evaluate-step p {
      margin: 0; font-size: 0.85rem;
      color: var(--muted-2); line-height: 1.5;
    }

    /* ---- Section header ---- */
    .section-kicker { color: var(--accent-2); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2rem; }

    /* ---- Spec doc cards ---- */
    .spec-docs { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 0.8rem; margin: 1rem 0; }
    .spec-doc { padding: 1rem 1.1rem; background: var(--surface); border-radius: var(--radius); text-decoration: none; color: var(--fg); border: 1px solid var(--border); transition: all 0.15s; }
    .spec-doc:hover { background: #fff; border-color: var(--accent-2); box-shadow: var(--shadow); text-decoration: none; }
    .spec-doc strong { display: block; color: var(--accent); font-size: 0.98rem; margin-bottom: 0.2rem; }
    .spec-doc span { color: var(--muted-2); font-size: 0.85rem; }

    /* ---- Footer ---- */
    .site-footer { border-top: 1px solid var(--border); padding: 2rem 1.4rem; color: var(--muted); font-size: 0.85rem; text-align: center; background: var(--surface); }
    .site-footer a { color: var(--muted-2); text-decoration: underline; text-underline-offset: 2px; }

    @media (max-width: 640px) {
      .nav-brand { flex-basis: 100%; margin-bottom: 0.4rem; }
      .nav-links { gap: 0.15rem 0.6rem; font-size: 0.88rem; }
      .nav-links .sep { display: none; }
      .hero { margin-left: -1.4rem; margin-right: -1.4rem; padding: 2.5rem 1.4rem 2.2rem; }
      .hero h1 { font-size: 2rem; }
      main { padding: 1.5rem 1.2rem 3rem; }
    }
  </style>
</head>
<body>

  <nav class="site-nav" aria-label="Primary">
    <div class="nav-inner">
      <div class="nav-brand">
        <a href="{{ '/' | relative_url }}"><span class="logo-dot"></span>OpenRiC<small>v0.2.0</small></a>
      </div>
      <div class="nav-links">
        <a href="{{ '/guides/getting-started.html' | relative_url }}" class="nav-cta">Start here</a>
        <a href="{{ '/spec/' | relative_url }}">Spec</a>
        <a href="{{ '/architecture.html' | relative_url }}">Architecture</a>
        <a href="{{ '/guides/' | relative_url }}">Guides</a>
        <a href="{{ '/demo/browse/' | relative_url }}">Browse</a>
        <a href="{{ '/api-explorer/' | relative_url }}">API Explorer</a>

        <a href="{{ '/proof.html' | relative_url }}">Proof</a>
        <a href="{{ '/governance.html' | relative_url }}">Governance</a>
        <a href="https://github.com/openric/spec" class="external">GitHub</a>
      </div>
    </div>
  </nav>

  <main>

</body>
