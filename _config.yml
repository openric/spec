title: OpenRiC
description: An open specification for Records in Contexts - mapping, viewing API, and graph primitives.
url: https://openric.org
markdown: kramdown
highlighter: rouge

author:
  name: The OpenRiC initiative
  email: johan@theahg.co.za

collections:
  help:
    output: true
    permalink: /help/:name/

defaults:
  - scope:
      path: ""
      type: help
    values:
      layout: help

exclude:
  - README.md
  - .gitignore
  - Gemfile
  - Gemfile.lock
  # Internal docs (session logs, outreach drafts, issues) - NOT website pages.
  # They contain code/SPARQL/Liquid-like text ({% , {{ ) that breaks the Jekyll
  # build (e.g. a URL-encoded "{%20" in a SPARQL query read as an unterminated
  # Liquid tag). Excluding keeps them git-tracked (for KM) without rendering them.
  - docs
